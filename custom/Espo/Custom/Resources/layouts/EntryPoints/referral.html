<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start jouw traject - Booming</title>
    <link rel="stylesheet" href="client/custom/res/tailwind.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="client/custom/res/widget-components.js"></script>
    <script src="client/custom/src/utils/widget-validation-utils.js"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-[#f8faff] min-h-screen flex items-center justify-center p-4">

<div id="app" v-cloak class="bg-white rounded-2xl shadow-xl max-w-6xl w-full flex flex-col md:flex-row overflow-hidden border border-gray-100 min-h-[650px]">

    <widget-sidebar
        title="Start jouw transformatie"
        description="Je bent uitgenodigd om kennis te maken met onze coaching. Vul je gegevens in en we nemen contact op om te kijken hoe we jou kunnen helpen."
        :features="['Persoonlijke intake', 'Direct resultaatgericht', '1-op-1 begeleiding']"
    ></widget-sidebar>

    <div class="flex-1 p-6 md:p-10 bg-white overflow-y-auto relative">
        
        <loading-overlay v-if="loading"></loading-overlay>

        <div v-if="!submitted" class="space-y-6">
            <div class="mb-2">
                <h3 class="text-lg font-extrabold text-gray-800">Jouw gegevens</h3>
                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">Vul het formulier in om te starten</p>
            </div>

            <error-alert v-if="errorMessage" :message="errorMessage"></error-alert>
            
            <form @submit.prevent="submitReferral" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <form-input v-model="form.firstName" placeholder="Voornaam *" required></form-input>
                    <form-input v-model="form.lastName" placeholder="Achternaam *" required></form-input>
                </div>

                <form-input v-model="form.email" type="email" placeholder="E-mailadres *" required></form-input>
                <form-input v-model="form.phone" type="tel" placeholder="Telefoonnummer *" required></form-input>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 mb-3 uppercase tracking-widest">Waarin ben je geïnteresseerd? *</label>
                    <div class="grid grid-cols-1 gap-2">
                        <multi-select-button
                            v-for="opt in interestOptions"
                            :key="opt"
                            :label="opt"
                            :selected="form.interests.includes(opt)"
                            @click="toggleInterest(opt)"
                        ></multi-select-button>
                    </div>
                </div>

                <div class="pt-2">
                    <label class="block text-[11px] font-bold text-gray-400 mb-2 uppercase tracking-widest">Wie heeft je met ons in contact gebracht? *</label>
                    <form-input v-model="form.referredBy" placeholder="Naam van je vriend(in) / kennis *" required></form-input>
                </div>

                <submit-button
                    :disabled="!isFormValid || loading"
                    :loading="loading"
                    label="Aanvraag Versturen"
                ></submit-button>
            </form>
        </div>

        <div v-else class="h-full flex flex-col justify-center items-center text-center animate-fade-in py-10">
            <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-green-100 text-green-600 rounded-full shadow-sm">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>

            <h3 class="text-2xl font-black text-gray-900 mb-4">Aanvraag Ontvangen!</h3>
            <p class="text-gray-600 mb-8 max-w-sm mx-auto leading-relaxed text-sm">
                Bedankt <strong>{{ form.firstName }}</strong>. We hebben je gegevens goed ontvangen.
                We nemen zo snel mogelijk contact met je op.
            </p>

            <div class="bg-gray-50 rounded-2xl p-6 text-left w-full max-w-xs border border-gray-100 mx-auto">
                <h4 class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-3">Referentie</h4>
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase">Via</p>
                        <p class="font-bold text-gray-900 text-sm">{{ form.referredBy }}</p>
                    </div>
                </div>
            </div>
            
            <p class="mt-12 text-gray-300 text-xs font-bold uppercase tracking-widest">Je kunt dit venster sluiten</p>
        </div>
    </div>
</div>

<script>
const { createApp, ref } = Vue;

createApp({
    components: {
        WidgetSidebar,
        LoadingOverlay,
        ErrorAlert,
        MultiSelectButton,
        FormInput,
        SubmitButton
    },
    setup() {
        const urlParams = new URLSearchParams(window.location.search);
        const submitted = ref(false);

        const interestOptions = [
            "Gewicht verliezen / vetverbranding",
            "Spieropbouw / sterker worden",
            "Conditie & energie verbeteren",
            "Buikspieren & core versterken",
            "Fitter worden in het dagelijks leven"
        ];

        const form = ref({
            firstName: '', 
            lastName: '', 
            email: '', 
            phone: '',
            interests: [], 
            referredBy: '', 
            coachId: urlParams.get('coach'),             
            source: 'referral'
        });

        const toggleInterest = (val) => {
            const idx = form.value.interests.indexOf(val);
            if (idx > -1) form.value.interests.splice(idx, 1);
            else form.value.interests.push(val);
        };

        const { isFormValid } = useFormValidation(form);

        const { loading, errorMessage, submitForm } = useWidgetSubmit(form, () => {
            submitted.value = true;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        const submitReferral = () => {
            if (form.value.interests.length === 0) {
                errorMessage.value = "Selecteer ten minste één interesse.";
                return;
            }
            submitForm();
        };

        return { 
            submitted, 
            loading, 
            errorMessage, 
            form, 
            interestOptions, 
            toggleInterest, 
            submitReferral,
            isFormValid
        };
    }
}).mount('#app');
</script>
</body>
</html>
