<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneltoevoegen Lead - SPARK Center Booming</title>
    <link rel="stylesheet" href="client/custom/res/tailwind.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="client/custom/src/utils/widget-validation-utils.js"></script>
    <script src="client/custom/res/widget-components.js"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-[#f8faff] min-h-screen flex items-center justify-center p-2 md:p-4">

<div id="app" v-cloak class="bg-white rounded-2xl shadow-xl max-w-4xl w-full flex flex-col md:flex-row overflow-hidden border border-gray-100 min-h-[500px]">
    
    <widget-sidebar
        title="Sneltoevoegen Lead"
        subtitle="Coach Tool"
        description="Gebruik dit formulier om snel een nieuwe lead te registreren in het systeem zonder enquête of referral-gegevens."
        badge-text="Directe Invoer"
    ></widget-sidebar>

    <div class="flex-1 p-6 md:p-10 relative">
        <loading-overlay v-if="loading" message="Bezig met opslaan..."></loading-overlay>

        <div class="max-w-md mx-auto space-y-6">
            <div>
                <h3 class="text-lg font-extrabold text-gray-800 mb-1">Contactgegevens</h3>
                <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">Vul de basisgegevens in</p>
            </div>

            <error-alert v-if="errorMessage" :message="errorMessage"></error-alert>

            <form @submit.prevent="submitForm" class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <form-input 
                        v-model="form.firstName" 
                        placeholder="Voornaam *" 
                        :error="errors.firstName"
                        @blur="markTouched('firstName')"
                        required>
                    </form-input>
                    
                    <form-input 
                        v-model="form.lastName" 
                        placeholder="Achternaam *" 
                        :error="errors.lastName"
                        @blur="markTouched('lastName')"
                        required>
                    </form-input>
                </div>
                
                <form-input 
                    v-model="form.email" 
                    type="email" 
                    placeholder="E-mailadres *" 
                    :error="errors.email"
                    @blur="markTouched('email')"
                    required>
                </form-input>
                
                <form-input 
                    v-model="form.phone" 
                    type="tel" 
                    placeholder="Telefoonnummer *" 
                    :error="errors.phone"
                    @blur="markTouched('phone')"
                    required>
                </form-input>

                <submit-button
                    :disabled="loading"
                    :loading="loading"
                    label="Lead Aanmaken"
                ></submit-button>
            </form>
        </div>
        <success-alert v-if="success" message="Lead succesvol toegevoegd!"></success-alert>
    </div>
</div>

<script>
const { createApp, ref } = Vue;

createApp({
    components: {
        'widget-sidebar': WidgetComponents.WidgetSidebar,
        'loading-overlay': WidgetComponents.LoadingOverlay,
        'error-alert': WidgetComponents.ErrorAlert,
        'success-alert': WidgetComponents.SuccessAlert,
        'form-input': WidgetComponents.FormInput,
        'submit-button': WidgetComponents.SubmitButton
    },
    setup() {
        const urlParams = new URLSearchParams(window.location.search);
        const { useWidgetSubmit, useFieldValidation } = WidgetComponents;

        const initialForm = {
            firstName: '', lastName: '', email: '', phone: '', 
            coachId: urlParams.get('coach'), source: 'direct'
        };

        const form = ref({...initialForm});

        const validation = useFieldValidation({
            firstName: {
                value: () => form.value.firstName,
                rules: [
                    ValidationRules.required('Voornaam is verplicht'),
                    ValidationRules.name('Voornaam')
                ]
            },
            lastName: {
                value: () => form.value.lastName,
                rules: [
                    ValidationRules.required('Achternaam is verplicht'),
                    ValidationRules.name('Achternaam')
                ]
            },
            email: {
                value: () => form.value.email,
                rules: [
                    ValidationRules.required('E-mailadres is verplicht'),
                    ValidationRules.email()
                ]
            },
            phone: {
                value: () => form.value.phone,
                rules: [
                    ValidationRules.required('Telefoonnummer is verplicht'),
                    ValidationRules.phone()
                ]
            }
        });

        const { errors, markTouched } = validation;

        const { loading, success, errorMessage, submitForm } = useWidgetSubmit(
            form,
            () => {
                form.value = {...initialForm};
                setTimeout(() => { success.value = false; }, 3000);
            },
            validation
        );

        return { 
            form, 
            errors,
            markTouched,
            submitForm,
            loading, 
            success, 
            errorMessage 
        };
    }
}).mount('#app');
</script>
</body>
</html>
