<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPARK Voucher Claimen</title>
    <link rel="stylesheet" href="client/custom/res/tailwind.min.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="client/custom/res/widget-components.js"></script>
    <script src="client/custom/src/utils/widget-validation-utils.js"></script>
    <style>[v-cloak] { display: none; }</style>
</head>
<body class="bg-[#f8faff] min-h-screen flex items-center justify-center p-2 md:p-4">

<div id="app" v-cloak class="bg-white rounded-2xl shadow-xl max-w-4xl w-full flex flex-col md:flex-row overflow-hidden border border-gray-100 min-h-[550px]">
    
    <widget-sidebar
        title="Voucher Claimen"
        description="Vul je gegevens in en laat ons weten waar je interesse in hebt om je gratis voucher te claimen."
        :current-step="step"
        :total-steps="2"
    ></widget-sidebar>

    <div class="flex-1 p-6 md:p-10">
        <loading-overlay v-if="loading"></loading-overlay>
        
        <!-- Step 1: Interests -->
        <div v-if="step === 1" class="space-y-6">
            <h3 class="text-lg font-extrabold text-gray-800">Stap 1: Waarvoor wil je de voucher gebruiken?</h3>

            <div>
                <label class="block text-[11px] font-bold text-gray-400 mb-3 uppercase tracking-widest">Ik heb interesse in... *</label>
                <div class="grid grid-cols-1 gap-2">
                    <multi-select-button
                        v-for="opt in options.ervaringen"
                        :key="opt"
                        :label="opt"
                        :selected="form.ervaringen.includes(opt)"
                        @click="toggleMulti('ervaringen', opt)"
                    ></multi-select-button>
                </div>
            </div>

            <submit-button :disabled="!isStep1Valid" label="Volgende stap" @click="step = 2"></submit-button>
        </div>

        <!-- Step 2: Contact Details -->
        <div v-if="step === 2" class="space-y-6">
            <button @click="step = 1" class="text-gray-400 font-bold text-[10px] uppercase tracking-widest hover:text-blue-600 flex items-center gap-1">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="3"/></svg> Terug naar interesses
            </button>
            <h3 class="text-lg font-extrabold text-gray-800">Stap 2: Jouw gegevens</h3>
            
            <error-alert v-if="errorMessage" :message="errorMessage"></error-alert>

            <div class="grid grid-cols-2 gap-4">
                <form-input v-model="form.firstName" placeholder="Voornaam *" required></form-input>
                <form-input v-model="form.lastName" placeholder="Achternaam *" required></form-input>
            </div>
            <form-input v-model="form.email" type="email" placeholder="E-mailadres *" required></form-input>
            <form-input v-model="form.phone" type="tel" placeholder="Telefoonnummer *" required></form-input>
            
            <textarea v-model="form.opmerking" rows="2" placeholder="Opmerking / Specifieke vraag" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-blue-600 text-sm"></textarea>

            <submit-button
                :disabled="!isStep2Valid || loading"
                :loading="loading"
                label="Voucher Claimen"
                variant="green"
                @click="submitVoucher"
            ></submit-button>

            <success-alert v-if="success" message="Je voucher werd geactiveerd!"></success-alert>
        </div>
    </div>
</div>

<script>
const { createApp, ref, computed } = Vue;

createApp({
    components: {
        'widget-sidebar': WidgetComponents.WidgetSidebar,
        'loading-overlay': WidgetComponents.LoadingOverlay,
        'multi-select-button': WidgetComponents.MultiSelectButton,
        'error-alert': WidgetComponents.ErrorAlert,
        'success-alert': WidgetComponents.SuccessAlert,
        'form-input': WidgetComponents.FormInput,
        'submit-button': WidgetComponents.SubmitButton
    },
    setup() {
        const urlParams = new URLSearchParams(window.location.search);
        const step = ref(1);
        
        const options = {
            ervaringen: ['Beauty workshop', 'Groepsworkout', 'Info-avond bijverdienen', 'Bodyscan + evaluatie']
        };

        const form = ref({
            ervaringen: [],
            firstName: '', 
            lastName: '', 
            email: '', 
            phone: '', 
            opmerking: '',
            coachId: urlParams.get('coach'),
            source: 'voucher'
        });

        const toggleMulti = (field, val) => {
            const index = form.value[field].indexOf(val);
            if (index > -1) form.value[field].splice(index, 1);
            else form.value[field].push(val);
        };

        const isStep1Valid = computed(() => form.value.ervaringen.length > 0);
        const { isFormValid: isStep2Valid } = useFormValidation(form);
        
        const { loading, success, errorMessage, submitForm } = useWidgetSubmit(form, () => {
            setTimeout(() => { 
                window.location.reload(); 
            }, 3000);
        });

        return { 
            step, 
            form, 
            options, 
            toggleMulti, 
            isStep1Valid, 
            isStep2Valid, 
            submitVoucher: submitForm, 
            loading,
            errorMessage,
            success
        };
    }
}).mount('#app');
</script>
</body>
</html>
